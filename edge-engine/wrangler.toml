name = "tradeer-edge-engine"
main = "build/worker/shim.mjs"
compatibility_date = "2024-03-24"

[build]
command = "cargo install -q worker-build && worker-build --release" 

[durable_objects]
bindings = [
  { name = "TRADE_LAB", class_name = "TradeLab" }
]

[[migrations]]
tag = "v1"
new_classes = ["TradeLab"]
